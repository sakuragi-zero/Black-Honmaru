receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  batch:
    timeout: 10s

exporters:
  # メトリクス → Prometheus スクレイプエンドポイントとして公開
  prometheus:
    endpoint: "0.0.0.0:8889"
    namespace: claude_code

  # ログ → コンソール出力（デバッグ用）
  debug:
    verbosity: normal

service:
  pipelines:
    metrics:
      receivers: [otlp]
      processors: [batch]
      exporters: [prometheus]
    logs:
      receivers: [otlp]
      processors: [batch]
      exporters: [debug]
